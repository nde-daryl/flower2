<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flowers For Her</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
}
#wrap {
  width:100%;
  height:100vh;
  min-height:500px;
  overflow:hidden;
  position:relative;
  background: radial-gradient(ellipse at 50% 100%, #3a0505 0%, #150000 55%, #000 100%);
}
canvas#stars { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
canvas#main  { position:absolute; inset:0; width:100%; height:100%; }

.bubble {
  position:absolute;
  color:#fff;
  font-family:'Georgia',serif;
  font-size:clamp(11px,2.8vw,14px);
  font-weight:600;
  background:rgba(160,10,10,0.88);
  border:1.5px solid rgba(255,80,80,0.55);
  border-radius:20px;
  padding:7px 15px;
  white-space:nowrap;
  opacity:0;
  transition:opacity 1s;
  pointer-events:none;
  letter-spacing:0.3px;
}
.bubble.show { opacity:1; }
.b1{ top:8%;  left:4%;               animation:bob1 4s 0.0s ease-in-out infinite; }
.b2{ top:8%;  right:4%;              animation:bob1 4s 0.6s ease-in-out infinite; }
.b3{ top:40%; left:3%;               animation:bob1 4s 1.2s ease-in-out infinite; }
.b4{ top:40%; right:3%;              animation:bob1 4s 1.8s ease-in-out infinite; }
.b5{ bottom:20%; left:50%; transform:translateX(-50%); animation:bob5 4s 2.4s ease-in-out infinite; }

@keyframes bob1 {
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-6px); }
}
@keyframes bob5 {
  0%,100%{ transform:translateX(-50%) translateY(0); }
  50%{ transform:translateX(-50%) translateY(-6px); }
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="stars"></canvas>
  <canvas id="main"></canvas>
  <div class="bubble b1">You are my favorite person</div>
  <div class="bubble b2">I'm lucky to have you</div>
  <div class="bubble b3">You make my world brighter ♥</div>
  <div class="bubble b4">Every flower reminds me of you</div>
  <div class="bubble b5">Forever grateful for you ♪</div>
</div>

<script>
const wrap = document.getElementById('wrap');
const sc   = document.getElementById('stars');
const sctx = sc.getContext('2d');
const c    = document.getElementById('main');
const ctx  = c.getContext('2d');

function resize(){
  sc.width = c.width = wrap.offsetWidth;
  sc.height = c.height = wrap.offsetHeight;
  drawStars();
}

function drawStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  for(let i=0;i<220;i++){
    const x=Math.random()*sc.width, y=Math.random()*sc.height*0.72;
    const r=Math.random()*1.3+0.2, a=Math.random()*0.65+0.2;
    sctx.beginPath(); sctx.arc(x,y,r,0,Math.PI*2);
    sctx.fillStyle=`rgba(255,215,140,${a})`; sctx.fill();
  }
  for(let i=0;i<18;i++){
    const x=Math.random()*sc.width, y=Math.random()*sc.height*0.5;
    const r=Math.random()*2+0.8;
    sctx.beginPath(); sctx.arc(x,y,r,0,Math.PI*2);
    sctx.fillStyle=`rgba(255,230,60,${Math.random()*0.5+0.3})`; sctx.fill();
  }
}

resize();
window.addEventListener('resize', resize);

const W = () => c.width;
const H = () => c.height;

let t = 0, grow = 0;
const SPEED = 0.0035;

const FLOWERS = [
  {fx:0.12, fh:0.30, sc:0.62, d:0.00},
  {fx:0.28, fh:0.18, sc:0.80, d:0.07},
  {fx:0.46, fh:0.10, sc:1.00, d:0.15},
  {fx:0.64, fh:0.17, sc:0.82, d:0.07},
  {fx:0.82, fh:0.28, sc:0.65, d:0.02},
  {fx:0.20, fh:0.24, sc:0.52, d:0.11},
  {fx:0.73, fh:0.24, sc:0.55, d:0.09},
];

const GRASS = [];
const gPos = [.03,.06,.09,.13,.17,.22,.30,.34,.38,.47,.52,.57,.63,.67,.71,.78,.83,.88,.92,.96];
gPos.forEach((xr,i)=>{
  GRASS.push({
    xr,
    angle:(Math.random()-0.5)*0.3,
    hFrac:0.28+Math.random()*0.18,
    w:2+Math.random()*1.5,
    phase:i*0.4
  });
});

function ease(v){ return 1-Math.pow(1-Math.max(0,Math.min(1,v)),3); }

function drawGround(){
  const gy = H()*0.88;
  ctx.fillStyle='#180700'; ctx.fillRect(0,gy,W(),H()-gy);
  ctx.fillStyle='#2a1000'; ctx.fillRect(0,gy,W(),7);
}

function drawGrass(){
  const gy = H()*0.88;
  GRASS.forEach(g=>{
    const gp = ease(Math.min(1, grow*2));
    if(gp<=0) return;
    const gh = H()*g.hFrac*gp;
    const sway = Math.sin(t*0.9+g.phase)*0.08;
    const gx = W()*g.xr;
    ctx.save(); ctx.translate(gx,gy);
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.bezierCurveTo(
      Math.sin(g.angle+sway)*gh*0.3,   -gh*0.4,
      Math.sin(g.angle+sway)*gh*0.45,  -gh*0.78,
      Math.sin(g.angle+sway+t*0.4)*gh*0.5 + Math.sin(t*0.5+g.phase)*3, -gh
    );
    ctx.lineWidth=g.w; ctx.strokeStyle='#1d9a45'; ctx.lineCap='round'; ctx.stroke();
    ctx.restore();
  });
}

function drawStem(bx, gy, fy, p, thick){
  if(p<=0) return;
  const ep  = ease(p);
  const curY = gy-(gy-fy)*ep;
  const sway = Math.sin(t*0.5)*5*ep;
  ctx.beginPath(); ctx.moveTo(bx,gy);
  ctx.quadraticCurveTo(bx+sway, (gy+curY)/2, bx, curY);
  ctx.lineWidth=thick; ctx.strokeStyle='#18a090'; ctx.lineCap='round'; ctx.stroke();
}

function drawLeaf(bx, by, side, ang, size, p){
  if(p<=0) return;
  const ep = ease(p);
  const lw = 44*size*ep, lh = 18*size*ep;
  ctx.save(); ctx.translate(bx+side*5, by);
  ctx.rotate(ang*side);
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.bezierCurveTo(side*lw*0.45,-lh*0.85, side*lw*0.88,-lh*0.52, side*lw,0);
  ctx.bezierCurveTo(side*lw*0.88,lh*0.28,  side*lw*0.38,lh*0.08,  0,0);
  ctx.fillStyle='#1db858'; ctx.fill();
  ctx.restore();
}

function drawFlower(cx, cy, size, p){
  if(p<=0) return;
  const ep = ease(p);
  const s  = size*ep;
  const PL = 32*s, PW = 14*s;
  const cols = ['#e84010','#f06025','#d92f08','#ec4818','#f07035'];

  for(let i=0;i<5;i++){
    const angle = (i/5)*Math.PI*2 + Math.PI/10 + t*0.18;
    const wobble = Math.sin(t*1.6+i)*0.05*ep;
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(angle+wobble); ctx.globalAlpha=0.93*ep;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.bezierCurveTo(-PW*0.55,-PL*0.28, -PW*0.7,-PL*0.72, 0,-PL);
    ctx.bezierCurveTo( PW*0.7,-PL*0.72,   PW*0.55,-PL*0.28, 0,0);
    ctx.fillStyle=cols[i]; ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;

  const cr = 11*s;
  const grd = ctx.createRadialGradient(cx,cy,0, cx,cy,cr);
  grd.addColorStop(0,   '#ffe855');
  grd.addColorStop(0.55,'#ffb820');
  grd.addColorStop(1,   '#e07800');
  ctx.globalAlpha=ep;
  ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
  ctx.beginPath(); ctx.arc(cx,cy,cr*0.5,0,Math.PI*2); ctx.fillStyle='#b05500'; ctx.fill();
  ctx.globalAlpha=1;
}

function drawSparkles(){
  const cx = W()*0.46, cy = H()*0.28;
  for(let i=0;i<10;i++){
    const a  = t*0.6 + i/10*Math.PI*2;
    const r  = 55 + Math.sin(t+i)*22;
    const px = cx + Math.cos(a)*r;
    const py = cy + Math.sin(a)*r*0.5;
    const sz = (Math.sin(t*2.2+i)+1)*2.8;
    ctx.beginPath(); ctx.arc(px,py,sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,215,50,${0.35+Math.sin(t*1.8+i)*0.3})`;
    ctx.fill();
  }
}

function frame(){
  ctx.clearRect(0,0,W(),H());
  const gy = H()*0.88;

  drawGround();
  drawSparkles();
  drawGrass();

  FLOWERS.forEach(fd=>{
    const stemP = ease(Math.max(0,(grow-fd.d*0.5))*2.0);
    const bx = W()*fd.fx;
    const fy = gy - (H()*0.82*(1-fd.fh));

    drawStem(bx, gy, fy, stemP, 5.5*fd.sc);

    if(stemP>0.3){
      const lp  = ease((stemP-0.3)/0.55);
      const mid = (gy+fy)/2;
      drawLeaf(bx, mid+H()*0.07, -1, 0.55, fd.sc, lp);
      drawLeaf(bx, mid,           1, 0.50, fd.sc, lp);
      if(fd.sc>0.7) drawLeaf(bx, fy+H()*0.09, -1, 0.44, fd.sc*0.72, lp);
    }

    if(stemP>0.68){
      const flp = (stemP-0.68)/0.32;
      drawFlower(bx, fy, fd.sc, flp);
    }
  });

  t += 0.016;
  if(grow < 1) grow = Math.min(1, grow+SPEED);

  if(grow > 0.82){
    document.querySelectorAll('.bubble').forEach(b => b.classList.add('show'));
  }

  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>

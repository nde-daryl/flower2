<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowers For Her</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 80%, #3a0a0a 0%, #1a0000 40%, #000000 100%);
    overflow: hidden;
    font-family: sans-serif;
  }
  canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  #scene { position: relative; width: 100%; height: 100vh; z-index: 1; }
  svg#garden { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; }

  .message-bubble {
    position: absolute;
    background: rgba(180, 20, 20, 0.85);
    border: 1.5px solid rgba(255, 80, 80, 0.6);
    border-radius: 20px;
    padding: 8px 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    animation: floatBubble 4s ease-in-out infinite;
    cursor: default;
    backdrop-filter: blur(4px);
  }
  .message-bubble:nth-child(1) { top: 18%; left: 6%; animation-delay: 0s; }
  .message-bubble:nth-child(2) { top: 22%; right: 8%; animation-delay: 0.7s; }
  .message-bubble:nth-child(3) { top: 48%; left: 4%; animation-delay: 1.4s; }
  .message-bubble:nth-child(4) { top: 52%; right: 5%; animation-delay: 2.1s; }
  .message-bubble:nth-child(5) { bottom: 22%; left: 50%; transform: translateX(-50%); animation-delay: 2.8s; }

  @keyframes floatBubble {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .message-bubble:nth-child(5) {
    animation: floatBubble5 4s ease-in-out infinite;
    animation-delay: 2.8s;
  }
  @keyframes floatBubble5 {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-8px); }
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle 2s ease-in-out infinite;
  }
  @keyframes sparkle {
    0% { opacity: 0; transform: scale(0.3) translateY(0); }
    50% { opacity: 1; transform: scale(1) translateY(-20px); }
    100% { opacity: 0; transform: scale(0.3) translateY(-40px); }
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="scene">
  <div class="message-bubble">You are my favorite person</div>
  <div class="message-bubble">I'm lucky to have you</div>
  <div class="message-bubble">You make my world brighter ♥</div>
  <div class="message-bubble">Every flower reminds me of you</div>
  <div class="message-bubble">Forever grateful for you ♪</div>

  <div id="particles"></div>

  <svg id="garden" viewBox="0 0 800 400" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="stemGrad" x1="0" x2="1" y1="0" y2="0">
        <stop offset="0%" stop-color="#1a9a8a"/>
        <stop offset="100%" stop-color="#0d6b5e"/>
      </linearGradient>
      <linearGradient id="leafGrad" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0%" stop-color="#2bc48a"/>
        <stop offset="100%" stop-color="#0e7a5a"/>
      </linearGradient>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Ground -->
    <rect x="0" y="360" width="800" height="40" fill="#1a0a00"/>

    <!-- Grasses far left -->
    <g opacity="0.9">
      <path d="M60,360 Q55,300 50,260" stroke="#1d8a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M70,360 Q80,290 85,240" stroke="#1a7a30" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M80,360 Q70,320 65,280" stroke="#22a040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M90,360 Q100,300 110,250" stroke="#1d8a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M100,360 Q95,330 88,295" stroke="#1a7a30" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <g opacity="0.85">
      <path d="M130,360 Q125,320 120,280" stroke="#22a040" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M140,360 Q148,305 155,260" stroke="#1d8a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M155,360 Q150,340 142,310" stroke="#1a7a30" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <g opacity="0.85">
      <path d="M600,360 Q605,300 610,250" stroke="#1d8a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M615,360 Q608,320 600,280" stroke="#22a040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M630,360 Q640,310 650,260" stroke="#1a7a30" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <g opacity="0.9">
      <path d="M700,360 Q695,300 690,255" stroke="#22a040" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M715,360 Q720,305 728,260" stroke="#1d8a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M730,360 Q722,320 715,280" stroke="#1a7a30" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M745,360 Q755,295 762,250" stroke="#22a040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M758,360 Q750,330 743,295" stroke="#1a7a30" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Flower 1 stem + leaves -->
    <path d="M230,360 Q228,300 225,230" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M228,320 Q200,290 185,300 Q205,280 228,295" fill="url(#leafGrad)"/>
    <path d="M227,290 Q258,265 270,275 Q252,260 227,272" fill="url(#leafGrad)"/>

    <!-- Flower 2 stem + leaves -->
    <path d="M310,360 Q308,280 305,180" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M308,300 Q275,270 258,285 Q280,260 308,278" fill="url(#leafGrad)"/>
    <path d="M307,250 Q342,220 358,232 Q338,212 307,228" fill="url(#leafGrad)"/>

    <!-- Flower 3 stem + leaves (tallest) -->
    <path d="M400,360 Q398,270 395,155" stroke="url(#stemGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M397,310 Q360,280 342,296 Q368,268 397,288" fill="url(#leafGrad)"/>
    <path d="M396,255 Q440,225 458,240 Q432,218 396,238" fill="url(#leafGrad)"/>
    <path d="M395,200 Q362,178 348,192 Q372,168 395,182" fill="url(#leafGrad)"/>

    <!-- Flower 4 stem + leaves -->
    <path d="M480,360 Q478,285 475,185" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M477,295 Q444,268 428,282 Q452,258 477,275" fill="url(#leafGrad)"/>
    <path d="M476,248 Q512,220 526,234 Q506,212 476,228" fill="url(#leafGrad)"/>

    <!-- Flower 5 stem + leaves -->
    <path d="M560,360 Q558,305 555,235" stroke="url(#stemGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M557,320 Q524,295 508,308 Q530,285 557,300" fill="url(#leafGrad)"/>
    <path d="M556,280 Q590,255 605,268 Q582,248 556,262" fill="url(#leafGrad)"/>

    <!-- Small stem left -->
    <path d="M185,360 Q183,325 180,275" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M183,320 Q162,300 152,310 Q168,293 183,305" fill="url(#leafGrad)"/>

    <!-- Small stem right -->
    <path d="M620,360 Q618,325 615,278" stroke="url(#stemGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M617,315 Q645,292 658,304 Q638,285 617,300" fill="url(#leafGrad)"/>

    <!-- Flower 1 petals at (225,225) -->
    <g filter="url(#glow)" transform="translate(225,225)">
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#e85520" transform="rotate(0)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#e85520" transform="rotate(72)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#e85520" transform="rotate(144)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#e85520" transform="rotate(216)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#e85520" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="10" fill="#ffcc44"/>
      <circle cx="0" cy="0" r="6" fill="#ffaa00"/>
    </g>

    <!-- Flower 2 petals at (305,178) -->
    <g filter="url(#glow)" transform="translate(305,178)">
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#ff7030" transform="rotate(0)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#ff7030" transform="rotate(72)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#e85520" transform="rotate(144)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#e85520" transform="rotate(216)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#ff7030" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="12" fill="#ffcc44"/>
      <circle cx="0" cy="0" r="7" fill="#ffaa00"/>
    </g>

    <!-- Flower 3 petals at (395,152) - tallest -->
    <g filter="url(#softglow)" transform="translate(395,152)">
      <ellipse cx="0" cy="-30" rx="14" ry="26" fill="#ff7030" transform="rotate(0)"/>
      <ellipse cx="0" cy="-30" rx="14" ry="26" fill="#ff8842" transform="rotate(72)"/>
      <ellipse cx="0" cy="-30" rx="14" ry="26" fill="#e85520" transform="rotate(144)"/>
      <ellipse cx="0" cy="-30" rx="14" ry="26" fill="#ff7030" transform="rotate(216)"/>
      <ellipse cx="0" cy="-30" rx="14" ry="26" fill="#ff8842" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="14" fill="#ffdd55"/>
      <circle cx="0" cy="0" r="8" fill="#ffbb00"/>
    </g>

    <!-- Flower 4 petals at (475,183) -->
    <g filter="url(#glow)" transform="translate(475,183)">
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#e85520" transform="rotate(0)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#ff7030" transform="rotate(72)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#ff7030" transform="rotate(144)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#e85520" transform="rotate(216)"/>
      <ellipse cx="0" cy="-25" rx="12" ry="22" fill="#ff7030" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="12" fill="#ffcc44"/>
      <circle cx="0" cy="0" r="7" fill="#ffaa00"/>
    </g>

    <!-- Flower 5 petals at (555,232) -->
    <g filter="url(#glow)" transform="translate(555,232)">
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#ff7030" transform="rotate(0)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#e85520" transform="rotate(72)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#ff7030" transform="rotate(144)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#e85520" transform="rotate(216)"/>
      <ellipse cx="0" cy="-22" rx="10" ry="18" fill="#ff7030" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="10" fill="#ffcc44"/>
      <circle cx="0" cy="0" r="6" fill="#ffaa00"/>
    </g>

    <!-- Flower 6 small at (180,272) -->
    <g filter="url(#glow)" transform="translate(180,272)">
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#e85520" transform="rotate(0)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#e85520" transform="rotate(72)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#e85520" transform="rotate(144)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#e85520" transform="rotate(216)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#e85520" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="8" fill="#ffcc44"/>
      <circle cx="0" cy="0" r="5" fill="#ffaa00"/>
    </g>

    <!-- Flower 7 small at (615,275) -->
    <g filter="url(#glow)" transform="translate(615,275)">
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#ff7030" transform="rotate(0)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#ff7030" transform="rotate(72)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#ff7030" transform="rotate(144)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#ff7030" transform="rotate(216)"/>
      <ellipse cx="0" cy="-16" rx="8" ry="13" fill="#ff7030" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="8" fill="#ffcc44"/>
      <circle cx="0" cy="0" r="5" fill="#ffaa00"/>
    </g>

    <!-- Floating sparkle dots animés -->
    <circle cx="350" cy="120" r="3" fill="#ffdd55" opacity="0.9">
      <animate attributeName="cy" values="120;100;120" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="100" r="2" fill="#ffaa33" opacity="0.8">
      <animate attributeName="cy" values="100;80;100" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="380" cy="85" r="2.5" fill="#ffdd55" opacity="0.7">
      <animate attributeName="cy" values="85;65;85" dur="3s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="460" cy="130" r="2" fill="#ffcc44" opacity="0.9">
      <animate attributeName="cy" values="130;110;130" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="320" cy="140" r="2" fill="#ffaa33" opacity="0.8">
      <animate attributeName="cy" values="140;118;140" dur="1.8s" repeatCount="indefinite" begin="1.4s"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
    <circle cx="500" cy="115" r="3" fill="#ffdd55" opacity="0.7">
      <animate attributeName="cy" values="115;92;115" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
  </svg>
</div>

<script>
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    drawStars();
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < 200; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height * 0.7;
      const r = Math.random() * 1.2 + 0.2;
      const alpha = Math.random() * 0.7 + 0.2;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,220,150,${alpha})`;
      ctx.fill();
    }
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height * 0.5;
      const r = Math.random() * 2 + 1;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,230,50,${Math.random() * 0.5 + 0.3})`;
      ctx.fill();
    }
  }

  window.addEventListener('resize', resize);
  resize();

  const particleContainer = document.getElementById('particles');
  const colors = ['#ffcc44', '#ffaa33', '#ff7030', '#ff4488', '#ffffff'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${20 + Math.random()*60}%;
      top:${30 + Math.random()*40}%;
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
      opacity:0;
    `;
    particleContainer.appendChild(p);
  }
</script>
</body>
</html>
